{% extends "base.html" %}

{% block title %}登录 — 钢筋精细化管理平台{% endblock %}

{% block page_title %}用户登录{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="bi bi-box-seam-fill"></i>
                </div>
                <h2>钢筋精细化管理平台</h2>
                <p class="text-muted">Rebar Fine Management Platform</p>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
                {{ csrf_field }}
                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person"></i> 账号
                    </label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="请输入登录账号" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock"></i> 密码
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">记住我（8小时）</label>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right"></i> 登 录
                </button>
            </form>

            <div class="login-footer">
                <small class="text-muted">
                    请联系管理员获取登录账号
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    /* 登录页覆盖侧边栏和顶部栏 */
    .sidebar, .topbar { display: none !important; }
    .main-content { margin-left: 0 !important; width: 100%; }

    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1A3C6E 0%, #1a4d8f 50%, #0d2137 100%);
    }
    .login-container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }
    .login-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        padding: 40px 32px;
    }
    .login-header {
        text-align: center;
        margin-bottom: 32px;
    }
    .login-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, #1A3C6E, #FF7A00);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        color: #fff;
    }
    .login-header h2 {
        color: #1A3C6E;
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 4px;
    }
    .form-label {
        font-weight: 500;
        color: #333;
    }
    .form-control {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
        border-color: #1A3C6E;
        box-shadow: 0 0 0 0.2rem rgba(26,60,110,0.15);
    }
    .btn-login {
        background: linear-gradient(135deg, #1A3C6E, #1a4d8f);
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s;
    }
    .btn-login:hover {
        background: linear-gradient(135deg, #FF7A00, #e06d00);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(255,122,0,0.3);
    }
    .login-footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #eee;
    }
    .alert {
        border-radius: 8px;
    }
</style>
{% endblock %}
