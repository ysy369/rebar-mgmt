{% extends "base.html" %}

{% block title %}登录 — 钢筋精细化管理平台{% endblock %}

{% block page_title %}用户登录{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="bi bi-box-seam-fill"></i>
                </div>
                <h2>钢筋精细化管理平台</h2>
                <p class="text-muted">Rebar Fine Management Platform</p>
            </div>

            <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
                {{ csrf_field }}
                <input type="hidden" name="platformType" id="platformType" value="jinguan">

                <!-- 平台选择 Tab -->
                <div class="platform-tabs" role="tablist">
                    <button type="button" class="platform-tab active" data-platform="jinguan" role="tab" aria-selected="true">
                        <i class="bi bi-speedometer2"></i>
                        <span>精管平台</span>
                    </button>
                    <button type="button" class="platform-tab" data-platform="jingsuan" role="tab" aria-selected="false">
                        <i class="bi bi-calculator"></i>
                        <span>精算平台</span>
                    </button>
                    <button type="button" class="platform-tab" data-platform="cost" role="tab" aria-selected="false">
                        <i class="bi bi-cash-stack"></i>
                        <span>成本管理平台</span>
                    </button>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person"></i> 账号
                    </label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="请输入登录账号" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock"></i> 密码
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">记住我（8小时）</label>
                </div>

                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right"></i> 登 录
                </button>
            </form>

            <div class="login-footer">
                <small class="text-muted">
                    请联系管理员获取登录账号
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    /* 登录页覆盖侧边栏和顶部栏 */
    .sidebar, .topbar { display: none !important; }
    .main-content { margin-left: 0 !important; width: 100%; }

    .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a2744 0%, #1a4d8f 50%, #0d2137 100%);
    }
    .login-container {
        width: 100%;
        max-width: 420px;
        padding: 20px;
    }
    .login-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        padding: 40px 32px;
    }
    .login-header {
        text-align: center;
        margin-bottom: 32px;
    }
    .login-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        background: linear-gradient(135deg, #1a2744, #f15a24);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        color: #fff;
    }
    .login-header h2 {
        color: #1a2744;
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 4px;
    }
    .form-label {
        font-weight: 500;
        color: #333;
    }
    .form-control {
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
        border-color: #1a2744;
        box-shadow: 0 0 0 0.2rem rgba(26,60,110,0.15);
    }
    .btn-login {
        background: linear-gradient(135deg, #1a2744, #1a4d8f);
        color: #fff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.3s;
    }
    .btn-login:hover {
        background: linear-gradient(135deg, #f15a24, #e06d00);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(255,122,0,0.3);
    }
    .login-footer {
        text-align: center;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #eee;
    }
    .alert {
        border-radius: 8px;
    }

    /* ========== 平台选择 Tab ========== */
    .platform-tabs {
        display: flex;
        gap: 0;
        margin-bottom: 24px;
        border-bottom: 2px solid #e8eaed;
    }
    .platform-tab {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 8px 12px;
        border: none;
        background: none;
        color: #9ca3af;
        font-size: 0.875rem;
        font-weight: 400;
        cursor: pointer;
        position: relative;
        transition: color 0.25s ease, font-weight 0.25s ease;
        white-space: nowrap;
    }
    .platform-tab::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 50%;
        transform: translateX(-50%) scaleX(0);
        width: 100%;
        height: 3px;
        background: var(--ink, #1a2744);
        border-radius: 3px 3px 0 0;
        transition: transform 0.25s ease;
    }
    .platform-tab:hover {
        color: #6b7280;
    }
    .platform-tab.active {
        color: var(--ink, #1a2744);
        font-weight: 700;
    }
    .platform-tab.active::after {
        transform: translateX(-50%) scaleX(1);
    }
    .platform-tab i {
        font-size: 1rem;
        transition: transform 0.25s ease;
    }
    .platform-tab.active i {
        transform: scale(1.15);
    }
</style>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const tabs = document.querySelectorAll('.platform-tab');
        const hiddenInput = document.getElementById('platformType');

        tabs.forEach(function (tab) {
            tab.addEventListener('click', function () {
                // 移除所有 active 状态
                tabs.forEach(function (t) {
                    t.classList.remove('active');
                    t.setAttribute('aria-selected', 'false');
                });
                // 设置当前选中
                this.classList.add('active');
                this.setAttribute('aria-selected', 'true');
                // 更新隐藏域值
                hiddenInput.value = this.getAttribute('data-platform');
            });
        });
    });
</script>
{% endblock %}
