{% extends "base.html" %}
{% block title %}{{ '编辑用户' if user else '新建用户' }}{% endblock %}
{% block page_title %}{{ '编辑用户' if user else '新建用户' }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">登录账号 <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" value="{{ user.username if user else '' }}" {{ 'readonly' if user else '' }} required>
        {% if user %}<small class="text-muted">账号不可修改</small>{% endif %}
      </div>
      <div class="mb-3">
        <label class="form-label">显示姓名 <span class="text-danger">*</span></label>
        <input type="text" name="display_name" class="form-control" value="{{ user.display_name if user else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">角色</label>
        <select name="role" class="form-select">
          <option value="user" {% if user and user.role=='user' %}selected{% endif %}>工程师（普通用户）</option>
          <option value="admin" {% if user and user.role=='admin' %}selected{% endif %}>管理员</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">{{ '新密码（留空不修改）' if user else '密码' }} <span class="{{ '' if user else 'text-danger' }}">{{ '*' if not user else '' }}</span></label>
        <input type="password" name="password" class="form-control" placeholder="{{ '留空则不修改密码' if user else '请输入密码' }}" {{ '' if user else 'required' }}>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="{{ url_for('admin.user_list') }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
