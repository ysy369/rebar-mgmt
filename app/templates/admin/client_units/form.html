{% extends "base.html" %}
{% block title %}{{ '编辑' if unit else '新建' }}甲方单位{% endblock %}
{% block page_title %}{{ '编辑' if unit else '新建' }}甲方单位{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">单位名称 <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" value="{{ unit.name if unit else '' }}" required placeholder="如：碧桂园集团">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="{{ url_for('admin.client_unit_list') }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
