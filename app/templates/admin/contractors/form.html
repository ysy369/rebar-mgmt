{% extends "base.html" %}
{% block title %}{{ '编辑' if contractor else '新建' }}承接公司{% endblock %}
{% block page_title %}{{ '编辑' if contractor else '新建' }}承接公司{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">公司名称 <span class="text-danger">*</span></label>
        <input type="text" name="name" class="form-control" value="{{ contractor.name if contractor else '' }}" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">联系人</label>
          <input type="text" name="contact_person" class="form-control" value="{{ contractor.contact_person or '' if contractor else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">联系电话</label>
          <input type="text" name="contact_phone" class="form-control" value="{{ contractor.contact_phone or '' if contractor else '' }}">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">地址</label>
        <input type="text" name="address" class="form-control" value="{{ contractor.address or '' if contractor else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">备注</label>
        <textarea name="remark" class="form-control" rows="3">{{ contractor.remark or '' if contractor else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="{{ url_for('admin.contractor_list') }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
