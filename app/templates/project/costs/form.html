{% extends "base.html" %}
{% block title %}{{ '编辑' if cost else '录入' }}成本 — {{ project.name }}{% endblock %}
{% block page_title %}{{ '编辑' if cost else '录入' }}成本 — {{ project.name }}{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">日期 <span class="text-danger">*</span></label>
          <input type="date" name="cost_date" class="form-control" value="{{ cost.cost_date.strftime('%Y-%m-%d') if cost else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">费用类别 <span class="text-danger">*</span></label>
          <select name="cost_category" class="form-select" required>
            {% for k,v in CATEGORY_LABELS.items() %}
            <option value="{{ k }}" {% if cost and cost.cost_category==k %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">费用项目 <span class="text-danger">*</span></label>
        <input type="text" name="cost_item" class="form-control" value="{{ cost.cost_item if cost else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">金额(元) <span class="text-danger">*</span></label>
        <input type="number" step="0.01" name="amount" class="form-control" value="{{ '%.2f'|format(cost.amount) if cost else '' }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">凭证号</label>
        <input type="text" name="receipt_no" class="form-control" value="{{ cost.receipt_no or '' if cost else '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">说明</label>
        <textarea name="description" class="form-control" rows="2">{{ cost.description or '' if cost else '' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 保存</button>
        <a href="{{ url_for('project.cost_list', project_id=project.id) }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
