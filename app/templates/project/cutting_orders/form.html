{% extends "base.html" %}
{% block title %}新建料单 — {{ project.name }}{% endblock %}
{% block page_title %}新建料单 — {{ project.name }}{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">料单日期 <span class="text-danger">*</span></label>
          <input type="date" name="order_date" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">批次号</label>
          <input type="text" name="batch_no" class="form-control">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">使用部位</label>
        <input type="text" name="use_location" class="form-control" placeholder="如：1#楼12层梁板">
      </div>
      <div class="mb-3">
        <label class="form-label">劳务队</label>
        <input type="text" name="labor_team" class="form-control">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> 创建料单</button>
        <a href="{{ url_for('project.cutting_order_list', project_id=project.id) }}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
