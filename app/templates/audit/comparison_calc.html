{% extends "base.html" %}
{% block title %}{{ page_title }} — 钢筋精细化管理平台{% endblock %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white">
        <ul class="nav nav-tabs card-header-tabs">
            <li class="nav-item">
                <a class="nav-link {% if category == 'coil' %}active{% endif %}" href="{{ url_for('audit.comparison_calc', category='coil') }}">盘螺对比</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if category == 'fixed' %}active{% endif %}" href="{{ url_for('audit.comparison_calc', category='fixed') }}">定尺余料对比</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if category == 'threshold' %}active{% endif %}" href="{{ url_for('audit.comparison_calc', category='threshold') }}">余料临界值</a>
            </li>
        </ul>
    </div>
    <div class="card-body text-center py-5">
        <i class="bi bi-cone-striped text-warning" style="font-size: 3rem;"></i>
        <h5 class="mt-3 text-muted">页面建设中</h5>
        <p class="text-muted small">{{ category_title }}功能正在开发中，敬请期待。</p>
    </div>
</div>
{% endblock %}
