{% extends "base.html" %}
{% block title %}导入{{ label }} — {{ project.name }}{% endblock %}
{% block page_title %}导入{{ label }} — {{ project.name }}{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:600px;">
    <div class="card-body text-center py-5">
        <i class="bi bi-file-earmark-excel" style="font-size:4rem;color:#198754;"></i>
        <h5 class="mt-3">上传 {{ label }} Excel 文件</h5>
        <p class="text-muted">支持 .xlsx / .xls 格式</p>

        <!-- 上传表单 -->
        <form id="import-form" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
            <div class="mb-3">
                <input type="file" name="file" id="import-file" class="form-control" accept=".xlsx,.xls" required>
            </div>
            <button type="submit" id="submit-btn" class="btn btn-primary">
                <i class="bi bi-cloud-upload"></i> 开始导入
            </button>
            <a href="{{ list_url }}" class="btn btn-outline-secondary ms-2">返回列表</a>
        </form>

        <!-- 进度显示区域 -->
        <div id="import-progress" style="display:none; margin-top: 30px;">
            <div class="progress" style="height: 24px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
                     role="progressbar" style="width: 0%;">0%</div>
            </div>
            <p id="status-text" class="mt-2 mb-1 text-muted">处理中...</p>
            <div id="error-msg" class="alert alert-danger mt-2" style="display:none;"></div>
            <div id="success-msg" class="alert alert-success mt-2" style="display:none;">
                <i class="bi bi-check-circle"></i> 导入完成！
                <a id="goto-list-link" href="{{ list_url }}" class="btn btn-sm btn-success ms-2">查看列表</a>
            </div>
        </div>
    </div>
</div>
<script>
(function() {
    var form = document.getElementById('import-form');
    var fileInput = document.getElementById('import-file');
    var submitBtn = document.getElementById('submit-btn');
    var progressArea = document.getElementById('import-progress');
    var progressBar = document.getElementById('progress-bar');
    var statusText = document.getElementById('status-text');
    var errorMsg = document.getElementById('error-msg');
    var successMsg = document.getElementById('success-msg');

    var pollTimer = null;

    function resetUI() {
        progressArea.style.display = 'none';
        progressBar.style.width = '0%';
        progressBar.textContent = '0%';
        statusText.textContent = '处理中...';
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        submitBtn.disabled = false;
    }

    function showProgress() {
        progressArea.style.display = 'block';
        submitBtn.disabled = true;
    }

    async function checkStatus(taskId) {
        try {
            var res = await fetch('/api/task/' + taskId + '/status');
            var data = await res.json();
            var pct = data.progress || 0;

            progressBar.style.width = pct + '%';
            progressBar.textContent = pct + '%';
            statusText.textContent = '状态: ' + (data.status || data.celery_status || '...');

            if (data.status === 'completed') {
                clearInterval(pollTimer);
                progressBar.classList.remove('progress-bar-animated');
                progressBar.classList.add('bg-success');
                successMsg.style.display = 'block';
                statusText.textContent = '导入完成，共处理 ' + (data.records_count || '?') + ' 条记录';
                submitBtn.disabled = false;
            }

            if (data.status === 'failed') {
                clearInterval(pollTimer);
                progressBar.classList.remove('progress-bar-animated');
                progressBar.classList.add('bg-danger');
                errorMsg.textContent = '导入失败: ' + (data.error_message || '未知错误');
                errorMsg.style.display = 'block';
                statusText.textContent = '导入失败';
                submitBtn.disabled = false;
            }
        } catch (e) {
            console.error('轮询状态失败:', e);
        }
    }

    function startPoll(taskId) {
        showProgress();
        checkStatus(taskId);
        pollTimer = setInterval(function() { checkStatus(taskId); }, 2000);
    }

    // AJAX 表单提交
    form.addEventListener('submit', function(e) {
        e.preventDefault();

        if (!fileInput.files.length) {
            alert('请选择文件。');
            return;
        }

        resetUI();
        showProgress();
        statusText.textContent = '正在上传文件...';

        var formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRF-Token': '{{ csrf_token }}'
            }
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.task_id) {
                statusText.textContent = '文件已上传，正在后台处理...';
                startPoll(data.task_id);
            } else if (data.error) {
                clearInterval(pollTimer);
                errorMsg.textContent = data.error;
                errorMsg.style.display = 'block';
                statusText.textContent = '提交失败';
                submitBtn.disabled = false;
            }
        })
        .catch(function(err) {
            clearInterval(pollTimer);
            errorMsg.textContent = '网络错误，请重试';
            errorMsg.style.display = 'block';
            statusText.textContent = '提交失败';
            submitBtn.disabled = false;
        });
    });
})();
</script>
{% endblock %}
