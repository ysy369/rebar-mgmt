{% extends "base.html" %}
{% block title %}导入{{ label }} — {{ project.name }}{% endblock %}
{% block page_title %}导入{{ label }} — {{ project.name }}{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm" style="max-width:600px;">
    <div class="card-body text-center py-5">
        <i class="bi bi-file-earmark-excel" style="font-size:4rem;color:#198754;"></i>
        <h5 class="mt-3">上传 {{ label }} Excel 文件</h5>
        <p class="text-muted">支持 .xlsx / .xls 格式</p>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3"><input type="file" name="file" class="form-control" accept=".xlsx,.xls" required></div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-cloud-upload"></i> 开始导入</button>
            <a href="{{ url_for('ledger.'+dtype+'_list', project_id=project.id) }}" class="btn btn-outline-secondary ms-2">返回列表</a>
        </form>
    </div>
</div>
{% endblock %}
